name: pokecraft_api
services:
  pokecraft_api_mongo:
    image: mongo
    container_name: pokecraft_api_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: pokecraft
      MONGO_INITDB_ROOT_PASSWORD: VQf5kLvtyEcb8FR7
    ports:
      - 27042:27017
    volumes:
      - mongodata:/data/db

  pokecraft_api_postgres:
    image: postgres
    container_name: pokecraft_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: V4zf8BvAy6cX2bjD
    ports:
      - 5442:5432
    volumes:
      - postgres_data:/var/lib/postgresql

  pokecraft_api_cms:
    image: logitar/krakenar:v2.1.0
    container_name: pokecraft_api_cms
    depends_on:
      - pokecraft_api_mongo
      - pokecraft_api_postgres
    restart: unless-stopped
    environment:
      ASPNETCORE_Environment: Development
      DATABASE_PROVIDER: EntityFrameworkCorePostgreSQL
      MONGOCONNSTR_Krakenar: mongodb://pokecraft:VQf5kLvtyEcb8FR7@pokecraft_api_mongo:27017/
      POSTGRESQLCONNSTR_Krakenar: User ID=postgres;Password=V4zf8BvAy6cX2bjD;Host=pokecraft_api_postgres;Port=5432;Database=cms;
    ports:
      - 8892:8080

volumes:
  mongodata:
  postgres_data:
